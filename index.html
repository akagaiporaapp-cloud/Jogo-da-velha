<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>✨ Jogo da Velha — Éter Tático</title>

  <!-- Google Fonts + ícones -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at 10% 20%, rgb(10, 20, 40) 0%, rgb(2, 6, 23) 100%);
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
      padding: 16px;
      position: relative;
      overflow-x: hidden;
    }

    /* partículas no fundo */
    body::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background-image: radial-gradient(#ffffff12 1px, transparent 1px);
      background-size: 32px 32px;
      pointer-events: none;
      z-index: 0;
    }

    /* container principal - TABULEIRO REDUZIDO */
    .game-container {
      width: 100%;
      max-width: 520px;
      background: rgba(18, 25, 45, 0.7);
      backdrop-filter: blur(18px);
      border-radius: 42px;
      border: 1px solid rgba(90, 150, 255, 0.3);
      box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.05);
      padding: 18px 20px 24px;
      transition: all 0.3s ease;
      z-index: 2;
    }

    /* ========== BANNER HORIZONTAL CHAMATIVO ========== */
    .youtube-banner {
      background: linear-gradient(105deg, #0f0c29, #302b63, #24243e);
      border-radius: 24px;
      margin-bottom: 18px;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
      border: 1px solid rgba(255, 50, 100, 0.5);
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255,255,255,0.08);
      transition: transform 0.25s ease, box-shadow 0.3s;
      cursor: pointer;
    }

    .youtube-banner:hover {
      transform: scale(1.01);
      box-shadow: 0 10px 22px rgba(255, 50, 100, 0.25);
      border-color: #ff3366;
      background: linear-gradient(105deg, #1a1640, #3b3175, #2b1f4e);
    }

    .banner-content {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .banner-icon {
      background: #ff0033;
      width: 40px;
      height: 40px;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      box-shadow: 0 0 10px rgba(255, 0, 50, 0.6);
    }

    .banner-text .main-msg {
      font-size: 1rem;
      font-weight: 800;
      background: linear-gradient(135deg, #FFD166, #FF6B6B, #FF3366);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    .banner-text .sub-msg {
      font-size: 0.75rem;
      color: #cbd5e6;
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 2px;
    }

    .banner-cta {
      background: rgba(255, 51, 102, 0.2);
      backdrop-filter: blur(4px);
      padding: 6px 14px;
      border-radius: 32px;
      border: 1px solid #ff3366;
      font-weight: 700;
      font-size: 0.8rem;
      color: #ffe0e7;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .youtube-banner:hover .banner-cta {
      background: #ff3366;
      color: white;
      box-shadow: 0 0 10px #ff3366;
    }

    /* cabeçalho do jogo - reduzido */
    .game-header {
      display: flex;
      align-items: baseline;
      justify-content: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 800;
      background: linear-gradient(135deg, #E0F2FE, #A5F3FC, #C084FC);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    .game-header i {
      font-size: 1.5rem;
      color: #c084fc;
    }

    /* status area - reduzido */
    .status-area {
      background: rgba(0, 0, 0, 0.45);
      border-radius: 50px;
      padding: 5px 16px;
      margin-bottom: 18px;
      display: inline-block;
      width: auto;
      margin-left: auto;
      margin-right: auto;
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .status {
      font-size: 1rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: #f1f5f9;
    }

    /* TABULEIRO - TAMANHO REDUZIDO */
    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 18px;
    }

    .cell {
      aspect-ratio: 1 / 1;
      background: rgba(20, 30, 55, 0.75);
      border: none;
      border-radius: 20px;
      font-size: 2.5rem;
      font-weight: 700;
      font-family: 'Inter', monospace;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      box-shadow: 0 8px 14px -8px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.05);
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
    }

    .cell:hover {
      transform: scale(1.02);
      background: rgba(40, 60, 105, 0.9);
      box-shadow: 0 12px 18px -10px rgba(0, 0, 0, 0.5);
    }

    .cell.x {
      background: linear-gradient(145deg, rgba(56, 189, 248, 0.3), rgba(2, 84, 152, 0.7));
      text-shadow: 0 0 6px #38bdf8;
      color: #bae6fd;
    }

    .cell.o {
      background: linear-gradient(145deg, rgba(244, 114, 182, 0.3), rgba(157, 23, 77, 0.7));
      text-shadow: 0 0 6px #f472b6;
      color: #fbcfe8;
    }

    /* botões duplos - reduzidos */
    .double-controls {
      display: flex;
      gap: 12px;
      margin: 6px 0 16px;
    }

    .btn {
      flex: 1;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(56, 189, 248, 0.4);
      padding: 10px 0;
      border-radius: 40px;
      font-size: 0.85rem;
      font-weight: 600;
      color: #e0f2fe;
      cursor: pointer;
      transition: all 0.25s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn i {
      font-size: 0.9rem;
    }

    .btn:hover {
      background: rgba(56, 189, 248, 0.2);
      border-color: #7dd3fc;
      transform: translateY(-2px);
    }

    .reset-all {
      border-color: rgba(244, 114, 182, 0.5);
    }
    .reset-all:hover {
      background: rgba(244, 114, 182, 0.2);
      border-color: #f472b6;
    }

    /* PLACAR - COMPLETAMENTE VISÍVEL SEM SCROLL */
    .scoreboard {
      display: flex;
      gap: 10px;
      margin-top: 6px;
      flex-wrap: wrap;
    }

    .score {
      flex: 1;
      min-width: 0;
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(4px);
      border-radius: 24px;
      padding: 8px 4px;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.08);
      transition: all 0.2s;
    }

    .score h2 {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #94a3b8;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      white-space: nowrap;
    }

    .score p {
      font-size: 1.6rem;
      font-weight: 800;
      background: linear-gradient(145deg, #f8fafc, #cbd5e1);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      line-height: 1;
    }

    /* ========== POPUP ANIMADO COM BOTÃO X ========== */
    .popup-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(8px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      visibility: hidden;
      opacity: 0;
      transition: visibility 0.3s, opacity 0.3s;
    }

    .popup-overlay.active {
      visibility: visible;
      opacity: 1;
    }

    .popup-card {
      position: relative;
      background: linear-gradient(145deg, #1e1b3c, #0f0c2c);
      border-radius: 40px;
      max-width: 400px;
      width: 90%;
      padding: 28px 24px;
      text-align: center;
      border: 2px solid rgba(255, 51, 102, 0.6);
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.5), 0 0 30px rgba(255, 51, 102, 0.3);
      transform: scale(0.7) translateY(30px);
      opacity: 0;
      transition: transform 0.4s cubic-bezier(0.34, 1.2, 0.64, 1), opacity 0.4s ease;
    }

    .popup-overlay.active .popup-card {
      transform: scale(1) translateY(0);
      opacity: 1;
    }

    /* Botão X de fechar */
    .popup-close-x {
      position: absolute;
      top: 16px;
      right: 20px;
      background: rgba(255, 255, 255, 0.1);
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.2rem;
      color: #cbd5e6;
      transition: all 0.2s;
      opacity: 0.5;
      pointer-events: none;
    }

    .popup-close-x.active {
      opacity: 1;
      pointer-events: auto;
      cursor: pointer;
    }

    .popup-close-x.active:hover {
      background: rgba(255, 51, 102, 0.5);
      color: white;
      transform: scale(1.1);
    }

    .popup-icon {
      background: #ff0033;
      width: 70px;
      height: 70px;
      border-radius: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      font-size: 2.5rem;
      box-shadow: 0 0 20px rgba(255, 0, 51, 0.7);
    }

    .popup-card h2 {
      font-size: 1.6rem;
      background: linear-gradient(135deg, #FFD166, #FF6B6B, #FF3366);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      margin-bottom: 10px;
    }

    .popup-card p {
      color: #cbd5e6;
      font-size: 0.95rem;
      margin-bottom: 14px;
      line-height: 1.4;
    }

    .popup-highlight {
      background: rgba(255, 51, 102, 0.15);
      border-radius: 32px;
      padding: 8px;
      margin: 12px 0;
      font-weight: 600;
      color: #ff99aa;
      font-size: 0.9rem;
    }

    .countdown-timer {
      font-size: 2.2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #38bdf8, #f472b6);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      margin: 8px 0;
    }

    .popup-main-btn {
      background: linear-gradient(90deg, #ff3366, #ff6680);
      border: none;
      padding: 12px 24px;
      border-radius: 40px;
      font-size: 0.95rem;
      font-weight: 700;
      color: white;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-top: 8px;
      opacity: 0.5;
      pointer-events: none;
    }

    .popup-main-btn.active {
      opacity: 1;
      pointer-events: auto;
      cursor: pointer;
    }

    .popup-main-btn.active:hover {
      transform: scale(1.03);
      box-shadow: 0 0 18px #ff3366;
    }

    /* animações extras */
    @keyframes gentlePulse {
      0% { transform: scale(1); opacity: 0.7; }
      100% { transform: scale(1.02); opacity: 1; }
    }
    .winner-glow {
      animation: gentlePulse 0.4s ease-in-out 2;
    }

    @media (max-width: 550px) {
      body {
        padding: 12px;
      }
      .game-container {
        padding: 14px 16px 20px;
      }
      .cell {
        font-size: 2rem;
        border-radius: 16px;
        gap: 8px;
      }
      .score p {
        font-size: 1.4rem;
      }
      h1 {
        font-size: 1.3rem;
      }
      .board {
        gap: 8px;
        margin-bottom: 14px;
      }
      .double-controls {
        gap: 8px;
        margin: 4px 0 12px;
      }
      .btn {
        padding: 8px 0;
        font-size: 0.75rem;
      }
      .score h2 {
        font-size: 0.6rem;
        white-space: normal;
      }
      .youtube-banner {
        padding: 8px 12px;
        margin-bottom: 12px;
      }
      .banner-cta {
        padding: 4px 10px;
        font-size: 0.7rem;
      }
      .status-area {
        margin-bottom: 14px;
      }
    }
  </style>
</head>
<body>

<div class="game-container">
  
  <!-- BANNER HORIZONTAL CHAMATIVO -->
  <div class="youtube-banner" id="youtubeBanner">
    <div class="banner-content">
      <div class="banner-icon">
        <i class="fab fa-youtube"></i>
      </div>
      <div class="banner-text">
        <span class="main-msg">🎯 DOMINE O TABULEIRO!</span>
        <span class="sub-msg">
          <i class="fas fa-fire"></i> Estratégia + Diversão
        </span>
      </div>
    </div>
    <div class="banner-cta">
      <i class="fab fa-youtube"></i> Conheça meu canal
      <i class="fas fa-arrow-right"></i>
    </div>
  </div>

  <div class="game-header">
    <i class="fas fa-gamepad"></i>
    <h1>Jogo da Velha</h1>
    <i class="fas fa-brain"></i>
  </div>

  <div style="display: flex; justify-content: center;">
    <div class="status-area">
      <div class="status" id="status">
        <i class="fas fa-circle" id="turnIcon" style="font-size: 0.9rem; color:#38bdf8;"></i>
        <span id="statusText">Vez do jogador X</span>
      </div>
    </div>
  </div>

  <div class="board" id="board"></div>

  <div class="double-controls">
    <button class="btn" id="resetMatchBtn">
      <i class="fas fa-arrows-rotate"></i> Nova Rodada
    </button>
    <button class="btn reset-all" id="resetFullBtn">
      <i class="fas fa-trash-alt"></i> Resetar Tudo
    </button>
  </div>

  <!-- PLACAR AGORA TOTALMENTE VISÍVEL -->
  <div class="scoreboard">
    <div class="score" id="scoreCardX">
      <h2><i class="fas fa-times-circle" style="color:#38bdf8;"></i> JOGADOR X</h2>
      <p id="scoreX">0</p>
    </div>
    <div class="score" id="scoreCardDraw">
      <h2><i class="fas fa-handshake"></i> EMPATES</h2>
      <p id="scoreDraw">0</p>
    </div>
    <div class="score" id="scoreCardO">
      <h2><i class="fas fa-circle" style="color:#f472b6;"></i> JOGADOR O</h2>
      <p id="scoreO">0</p>
    </div>
  </div>
</div>

<!-- POPUP COM BOTÃO X E BOTÃO PRINCIPAL -->
<div id="popupOverlay" class="popup-overlay">
  <div class="popup-card">
    <div class="popup-close-x" id="popupCloseX">
      <i class="fas fa-times"></i>
    </div>
    <div class="popup-icon">
      <i class="fab fa-youtube"></i>
    </div>
    <h2>🔥 CANAL EXCLUSIVO!</h2>
    <p>Estratégias, conteúdos incríveis e muito entretenimento!</p>
    <div class="popup-highlight">
      <i class="fas fa-trophy"></i> Inscreva-se no meu canal do YouTube
    </div>
    <div>
      <span class="countdown-timer" id="countdownNumber">5</span>
      <p style="font-size: 0.75rem; margin-top: 4px;">Aguarde 5 segundos para interagir</p>
    </div>
    <button id="popupMainBtn" class="popup-main-btn">
      <i class="fab fa-youtube"></i> CONHECER CANAL AGORA!
    </button>
  </div>
</div>

<script>
  // Elementos DOM
  const boardEl = document.getElementById("board");
  const statusSpan = document.getElementById("statusText");
  const turnIcon = document.getElementById("turnIcon");
  
  // Estado do jogo
  let cells = ["", "", "", "", "", "", "", "", ""];
  let currentPlayer = "X";
  let gameActive = true;
  
  // Placar
  let scoreX = 0;
  let scoreO = 0;
  let scoreDraw = 0;
  
  const winPatterns = [
    [0,1,2], [3,4,5], [6,7,8],
    [0,3,6], [1,4,7], [2,5,8],
    [0,4,8], [2,4,6]
  ];
  
  function updateTurnUI() {
    if (!gameActive) return;
    statusSpan.innerText = `Vez do jogador ${currentPlayer}`;
    turnIcon.className = "fas fa-circle";
    turnIcon.style.color = currentPlayer === "X" ? "#38bdf8" : "#f472b6";
  }
  
  function highlightWinningCombo(combo) {
    if (!combo) return;
    const allCells = document.querySelectorAll(".cell");
    combo.forEach(index => {
      if (allCells[index]) {
        allCells[index].style.transition = "0.1s";
        allCells[index].style.boxShadow = "0 0 0 3px rgba(192, 132, 252, 0.9), 0 0 18px #c084fc";
        setTimeout(() => {
          if (allCells[index]) allCells[index].style.boxShadow = "";
        }, 550);
      }
    });
  }
  
  function getWinnerInfo() {
    for (let pattern of winPatterns) {
      const [a,b,c] = pattern;
      if (cells[a] && cells[a] === cells[b] && cells[a] === cells[c]) {
        return { winner: cells[a], pattern: pattern };
      }
    }
    return { winner: null, pattern: null };
  }
  
  function isDrawGame() {
    return !cells.includes("") && !getWinnerInfo().winner;
  }
  
  function animateScoreCard(type) {
    let card = null;
    if (type === "X") card = document.getElementById("scoreCardX");
    else if (type === "O") card = document.getElementById("scoreCardO");
    else if (type === "draw") card = document.getElementById("scoreCardDraw");
    if (card) {
      card.style.transform = "scale(1.02)";
      card.style.background = "rgba(56, 189, 248, 0.25)";
      if (type === "O") card.style.background = "rgba(244, 114, 182, 0.25)";
      if (type === "draw") card.style.background = "rgba(203, 213, 225, 0.2)";
      setTimeout(() => {
        card.style.transform = "";
        card.style.background = "";
      }, 280);
    }
  }
  
  function renderBoard() {
    boardEl.innerHTML = "";
    cells.forEach((value, idx) => {
      const btn = document.createElement("button");
      btn.classList.add("cell");
      if (value === "X") btn.classList.add("x");
      if (value === "O") btn.classList.add("o");
      btn.innerText = value;
      if (!gameActive && value === "") {
        btn.style.cursor = "default";
        btn.style.opacity = "0.6";
      } else {
        btn.style.cursor = "pointer";
        btn.style.opacity = "1";
      }
      btn.addEventListener("click", (e) => {
        e.stopPropagation();
        if (gameActive && cells[idx] === "") {
          processMove(idx);
        }
      });
      boardEl.appendChild(btn);
    });
  }
  
  function processMove(index) {
    if (!gameActive) return;
    if (cells[index] !== "") return;
    
    cells[index] = currentPlayer;
    renderBoard();
    
    const winnerInfo = getWinnerInfo();
    if (winnerInfo.winner) {
      highlightWinningCombo(winnerInfo.pattern);
      const winner = winnerInfo.winner;
      statusSpan.innerHTML = `🏆 Jogador ${winner} venceu! 🏆`;
      turnIcon.className = "fas fa-crown";
      turnIcon.style.color = winner === "X" ? "#38bdf8" : "#f472b6";
      gameActive = false;
      
      if (winner === "X") {
        scoreX++;
        document.getElementById("scoreX").innerText = scoreX;
        animateScoreCard("X");
      } else {
        scoreO++;
        document.getElementById("scoreO").innerText = scoreO;
        animateScoreCard("O");
      }
      
      document.querySelector(".game-container").classList.add("winner-glow");
      setTimeout(() => document.querySelector(".game-container").classList.remove("winner-glow"), 500);
      return;
    }
    
    if (isDrawGame()) {
      statusSpan.innerHTML = "🤝 Empate! 🤝";
      turnIcon.className = "fas fa-hand-peace";
      turnIcon.style.color = "#cbd5e1";
      gameActive = false;
      scoreDraw++;
      document.getElementById("scoreDraw").innerText = scoreDraw;
      animateScoreCard("draw");
      document.querySelector(".game-container").style.borderColor = "rgba(203, 213, 225, 0.6)";
      setTimeout(() => document.querySelector(".game-container").style.borderColor = "rgba(90, 150, 255, 0.3)", 500);
      return;
    }
    
    currentPlayer = currentPlayer === "X" ? "O" : "X";
    updateTurnUI();
  }
  
  function resetMatch() {
    cells = ["", "", "", "", "", "", "", "", ""];
    currentPlayer = "X";
    gameActive = true;
    renderBoard();
    statusSpan.innerText = "Vez do jogador X";
    turnIcon.className = "fas fa-circle";
    turnIcon.style.color = "#38bdf8";
    document.querySelector(".game-container").classList.remove("winner-glow");
    document.querySelector(".game-container").style.borderColor = "rgba(90, 150, 255, 0.3)";
    const allCellsDom = document.querySelectorAll(".cell");
    allCellsDom.forEach(cell => {
      cell.style.boxShadow = "";
      cell.style.opacity = "";
      cell.style.cursor = "pointer";
    });
  }
  
  function resetFullGame() {
    cells = ["", "", "", "", "", "", "", "", ""];
    currentPlayer = "X";
    gameActive = true;
    scoreX = 0;
    scoreO = 0;
    scoreDraw = 0;
    document.getElementById("scoreX").innerText = "0";
    document.getElementById("scoreO").innerText = "0";
    document.getElementById("scoreDraw").innerText = "0";
    renderBoard();
    statusSpan.innerText = "Vez do jogador X";
    turnIcon.className = "fas fa-circle";
    turnIcon.style.color = "#38bdf8";
    document.querySelector(".game-container").classList.remove("winner-glow");
    document.querySelector(".game-container").style.borderColor = "rgba(90, 150, 255, 0.3)";
    const allCellsDom = document.querySelectorAll(".cell");
    allCellsDom.forEach(cell => {
      cell.style.boxShadow = "";
      cell.style.opacity = "";
      cell.style.cursor = "pointer";
    });
  }
  
  function setupBanner() {
    const banner = document.getElementById("youtubeBanner");
    const channelUrl = "https://youtube.com/@thedragon-i7x?si=qOY7g_bXsadgiQ3K";
    if (banner) {
      banner.addEventListener("click", (e) => {
        e.preventDefault();
        window.open(channelUrl, "_blank", "noopener,noreferrer");
      });
      banner.style.cursor = "pointer";
    }
  }
  
  // POPUP com contagem e botão X
  function setupPopup() {
    const overlay = document.getElementById("popupOverlay");
    const closeX = document.getElementById("popupCloseX");
    const mainBtn = document.getElementById("popupMainBtn");
    const countdownSpan = document.getElementById("countdownNumber");
    const channelUrl = "https://youtube.com/@thedragon-i7x?si=qOY7g_bXsadgiQ3K";
    
    let countdown = 5;
    let interval = null;
    
    overlay.classList.add("active");
    
    function enableButtons() {
      if (interval) clearInterval(interval);
      closeX.classList.add("active");
      mainBtn.classList.add("active");
      countdownSpan.innerText = "0";
    }
    
    function updateCountdown() {
      countdownSpan.innerText = countdown;
      if (countdown <= 0) {
        enableButtons();
      }
      countdown--;
    }
    
    updateCountdown();
    interval = setInterval(() => {
      if (countdown >= 0) {
        updateCountdown();
      } else {
        if (interval) clearInterval(interval);
      }
    }, 1000);
    
    function redirectAndClose() {
      window.open(channelUrl, "_blank", "noopener,noreferrer");
      overlay.classList.remove("active");
      if (interval) clearInterval(interval);
    }
    
    mainBtn.addEventListener("click", (e) => {
      if (mainBtn.classList.contains("active")) {
        redirectAndClose();
      }
    });
    
    closeX.addEventListener("click", (e) => {
      if (closeX.classList.contains("active")) {
        overlay.classList.remove("active");
        if (interval) clearInterval(interval);
      }
    });
    
    overlay.addEventListener("click", (e) => {
      if (e.target === overlay && closeX.classList.contains("active")) {
        overlay.classList.remove("active");
        if (interval) clearInterval(interval);
      }
    });
  }
  
  function init() {
    renderBoard();
    updateTurnUI();
    setupBanner();
    setupPopup();
    
    const resetMatchBtn = document.getElementById("resetMatchBtn");
    const resetFullBtn = document.getElementById("resetFullBtn");
    if (resetMatchBtn) {
      resetMatchBtn.removeEventListener("click", resetMatch);
      resetMatchBtn.addEventListener("click", resetMatch);
    }
    if (resetFullBtn) {
      resetFullBtn.removeEventListener("click", resetFullGame);
      resetFullBtn.addEventListener("click", resetFullGame);
    }
  }
  
  document.querySelectorAll('.score').forEach(card => {
    card.addEventListener('mouseenter', (e) => {
      e.currentTarget.style.transform = "translateY(-3px)";
    });
    card.addEventListener('mouseleave', (e) => {
      e.currentTarget.style.transform = "";
    });
  });
  
  init();
</script>
</body>
</html>
